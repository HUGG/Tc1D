# Tc1D input file (YAML)
#
# Goal:
# - Replace command lines with a readable config file
# - If a key is omitted, Tc1D falls back to tc1d-cli defaults
#
# IMPORTANT:
# - YAML keys present here override argparse values (and thus override CLI flags)
# - Avoid defining the same key twice in this file: the last occurrence wins
#
# ---------------------------------------------------------------------------
# Inversion syntax (NA / MCMC)
#
# For any parameter you want to invert, write it as a 2-element range:
#   param: [min, max]
#
# Examples:
#   ero_option1: [0.0, 20.0]   # invert within 0..20 km for instance
#   temp_base:   [1200, 1400] #
#
# For any parameter you want to fix, write it as a scalar:
#   param: 7.0
#
# Notes:
# - Ranges are equivalent to the CLI syntax:  --param min max
# - Scalars are equivalent to the CLI syntax: --param value
# ---------------------------------------------------------------------------

# Units:
# - time: Myr
# - dt: years
# - lengths/depths/thicknesses: km
# - erosion rates: depend on ero_type (see comments below)

# ==============================================================================
# 1) General / run control
# ==============================================================================
general:
  run_type: "mcmc"          # forward / batch / na / mcmc
  batch_mode: false
  inverse_mode: true
  debug: false

  # Screen output toggles
  echo_inputs: false
  no_echo_info: true
  no_echo_thermal_info: true
  no_echo_ages: true

# ==============================================================================
# 2) Geometry and time
# ==============================================================================
geometry_time:
  length: 125.0                # --length (model depth extent)
  nx: 251                      # --nx
  time: 15.0                 # --time
  dt: 20000.0                  # --dt

  init_moho_depth: 50.0        # --init-moho-depth
  crustal_uplift: false        # --crustal-uplift
  fixed_moho: false            # --fixed-moho

  removal_fraction: 0.0        # --removal-fraction
  removal_start_time: 0.0      # --removal-start-time
  removal_end_time: -1.0       # --removal-end-time

# ==============================================================================
# 3) Materials
# ==============================================================================
materials:
  rho_crust: 2850.0
  cp_crust: 800.0
  k_crust: 2.75
  heat_prod_crust: 0.5
  heat_prod_decay_depth: -1.0
  alphav_crust: 3.0e-5

  rho_mantle: 3250.0
  cp_mantle: 1000.0
  k_mantle: 2.5
  heat_prod_mantle: 0.0
  alphav_mantle: 3.0e-5

  rho_a: 3250.0
  k_a: 20.0

# ==============================================================================
# 4) Thermal model
# ==============================================================================
thermal_model:
  explicit: false              # false => implicit scheme
  mantle_adiabat: true

  temp_surf: 0.0
  temp_base: 1300.0

# ==============================================================================
# 5) Magmatic intrusion (optional)
# ==============================================================================
intrusion_model:
  intrusion_temperature: 750.0
  intrusion_start_time: -1.0
  intrusion_duration: -1.0
  intrusion_thickness: -1.0
  intrusion_base_depth: -1.0

# ==============================================================================
# 6) Erosion model
# ==============================================================================
erosion_model:
  vx_init: 0.0                 # --vx-init (mm/yr)

  # Select erosion model (0 to 7)
  # 0: multi-stage erosion defined directly in YAML (ero_stages)
  # 1: constant erosion magnitude (total thickness in km over the run)
  # 2: stepwise thicknesses with transition times
  # 3: exponential decay
  # 4: thrust sheet emplacement + erosional removal
  # 5: tectonic exhumation + erosion
  # 6: linear change in erosion rate
  # 7: extensional tectonics
  ero_type: 0

  # ---- Active parameters (EDIT THESE) ----------------------------------------
  # Define only the options used by your selected ero_type.
  # Unused options can be omitted; tc1d-cli defaults will apply.

  # ero_type = 2 (example: two intervals)
  #ero_option1: 10.0
  #ero_option2: 5.0
  #ero_option3: 2.0
  #ero_option4: 10.0

  # ---- Optional: ero_type = 0 (Multi-stage erosion) ---------------
  # BG: YAML-defined multi-stage erosion/burial history
#  ero_stages:
    # Stage 1: exponential decay
#    - type: exponential
#      unit: erosion_rate
#      duration_myr: [0.1, 5.0]
#      parameter1: [0.1, 4.0]    # r_start (km/Myr)
#      parameter2: [0.1, 3.0] # tau (Myr)
#      parameter3: 0.01 # r_target (km/Myr)

    # Stage 2: constant erosion
#    - type: constant
#      unit: erosion_rate
#      duration_myr: [1.0, 10.0]
#      parameter1: 0.01

    # Stage 3: linear increase
#    - type: linear
#      unit: erosion_rate
#      duration_myr: [0.1, 6.0]
#      parameter1: 0.01
#      parameter2: [0.1, 3.0]

  # --- RJMCMC trans-dimensional stage model selection -------------------------
  # BG: This block activates a reversible-jump MCMC inversion in which:
  #   - the number of erosion stages K is itself inverted
  #   - each stage is exponential and described by:
  #       duration_myr, r_start, tau, r_target
  #
  # Practical meaning:
  #   - small K  -> simpler erosion histories
  #   - large K  -> more flexible / more detailed erosion histories
  #

  transdimensional:
    enabled: true
    # true  = run RJMCMC inversion
    # false = ignore this block

    stage_type: exponential
    # Only "exponential" is currently supported in RJMCMC v1.
    #
    # Exponential stage meaning:
    #   erosion rate starts at r_start and evolves toward r_target
    #   with characteristic timescale tau.
    #
    # Allowed value:
    #   exponential

    unit: erosion_rate
    # Parameters are interpreted as erosion rates [km/Myr].
    #
    # Allowed value:
    #   erosion_rate

    # ---- Model dimension bounds ----------------------------------------------
    k_min: 1
    # Minimum number of erosion stages allowed.
    #
    # Effect:
    #   - smaller values allow simpler models
    #   - larger values force more complexity

    k_max: 8
    # Maximum number of erosion stages allowed.
    #
    # Effect:
    #   - larger values allow more complex erosion histories
    #   - too large values may slow mixing and encourage overfitting

    # ---- Prior bounds on stage parameters (uniform priors) -------------------
    duration_bounds_myr: [0.05, 15.0]
    # Allowed duration of each exponential stage [Myr].
    #
    # Meaning:
    #   each stage must last between min and max duration.
    #
    # Effect of changing bounds:
    #   - increasing max allows very long stages
    #   - decreasing min prevents tiny short-lived stages
    #   - too small a min may create many artificial micro-stages
    #
    # Recommended range:
    #   min: 0.05 to 0.5
    #   max: should be compatible with total model time t_total

    r_start_bounds: [0.0, 4.0]
    # Initial erosion rate at the start of each stage [km/Myr].
    #
    # Meaning:
    #   this controls how fast erosion starts at the beginning of a stage.
    #
    # Effect of changing bounds:
    #   - larger max allows very rapid short-lived erosion pulses
    #   - smaller max constrains the inversion to smoother/slower histories
    #
    # Recommended range:
    #   [0.0, 2.0] for moderate systems
    #   [0.0, 4.0] if strong exhumation pulses are plausible
    #
    # Good default:
    #   [0.0, 4.0]

    tau_bounds: [0.05, 5.0]
    # Exponential characteristic time [Myr].
    #
    # Meaning:
    #   tau controls how quickly the erosion rate evolves from r_start toward
    #   r_target.
    #
    # Small tau:
    #   rapid adjustment toward r_target
    #
    # Large tau:
    #   slower, smoother evolution
    #
    # Effect of changing bounds:
    #   - very small tau allows abrupt decay / adjustment
    #   - large tau allows broad smooth transitions
    #
    # Good default:
    #   [0.05, 5.0]

    r_target_bounds: [0.0, 1.0]
    # Long-term asymptotic erosion rate [km/Myr].
    #
    # Meaning:
    #   the stage tends toward this rate as time increases.
    #
    # Effect of changing bounds:
    #   - larger max allows sustained high long-term erosion
    #   - smaller max favors decay toward low background erosion
    #
    # Good default:
    #   [0.0, 1.0]

    # ---- Move probabilities ---------------------------------------------------
    # These three values are internally normalized to sum to 1.
    #
    # within = perturb parameters inside the current model dimension K
    # birth  = split a stage, increasing K by 1
    # death  = merge two stages, decreasing K by 1
    #
    # If birth is too small:
    #   the chain may stay too long in low K
    #
    # If death is too small:
    #   the chain may accumulate too many stages
    #
    # If within is too small:
    #   the chain changes K often but does not optimize stage parameters enough
    moves:
      p_within: 0.55
      # Recommended range:
      #   0.50 to 0.70
      #
      # Good default:
      #   0.55

      p_birth: 0.25
      # Recommended range:
      #   0.15 to 0.30
      #
      # Increase if:
      #   chain struggles to reach higher K
      #
      # Decrease if:
      #   chain spends too much time in very complex models

      p_death: 0.20
      # Recommended range:
      #   0.15 to 0.30
      #
      # Increase if:
      #   chain tends to stay too long at large K
      #
      # Good default:
      #   0.20

    rjmcmc:
      nsteps: 20000
      # Total number of RJMCMC iterations.
      #
      # Effect:
      #   more steps = better exploration, slower run
      #
      # Recommended:
      #   3000 to 5000 for testing
      #   10000+ for more stable interpretation
      #
      # Good default:
      #   5000

      burnin: 2000
      # Number of initial iterations discarded before saving posterior samples.
      #
      # Effect:
      #   removes early transient phase before the chain reaches good solutions
      #
      # Recommended:
      #   about 10% of nsteps as a first guess
      #
      # Good default:
      #   500 for nsteps=5000

      thin: 10
      # Save one sample every 'thin' iterations after burnin.
      #
      # Effect:
      #   larger thin reduces file size and autocorrelation in saved samples
      #   smaller thin keeps more detail but creates bigger CSV files
      #
      # Recommended range:
      #   2 to 10
      #
      # Good default:
      #   5

      debug_nsteps: 0
      # Optional override of nsteps for quick testing.
      #
      # If > 0:
      #   the code uses debug_nsteps instead of nsteps
      #
      # If = 0:
      #   the code uses nsteps normally
      #
      # Recommended:
      #   set equal to nsteps for explicit testing
      #   or set to 0 for production
      #
      # Good default for test:
      #   5000

      progress_every: 50
      # Print progress every N iterations in the terminal.
      #
      # Effect:
      #   smaller values = more verbose terminal output
      #   larger values = cleaner terminal output
      #
      # Recommended range:
      #   20 to 100
      #
      # Good default:
      #   50

      seed: 123
      # Random seed for reproducibility.
      #
      # Effect:
      #   same seed -> same stochastic run
      #   different seed -> independent repeat
      #
      # Recommendation:
      #   keep fixed during debugging
      #   vary later to test robustness

      # ---- Random-walk proposal widths ---------------------------------------
      rw_sigma:
        duration_myr: 0.3
      # Proposal step size for duration_myr during within-model moves.
      #
      # Effect:
      #   larger value -> bigger jumps in duration
      #   smaller value -> more conservative/local exploration
      #
      # If within acceptance is too high (>~0.8 often):
      #   try increasing this slightly
      #
      # Recommended range:
      #   0.1 to 0.5
      #
      # Good default:
      #   0.2

        r_start: 0.3
      # Proposal step size for r_start [km/Myr].
      #
      # Effect:
      #   larger value -> more aggressive exploration
      #   smaller value -> finer local tuning
      #
      # Recommended range:
      #   0.1 to 0.5
      #
      # Good default:
      #   0.2

        tau: 0.3
      # Proposal step size for tau [Myr].
      #
      # Effect:
      #   controls how strongly tau changes in within moves
      #
      # Recommended range:
      #   0.1 to 0.5
      #
      # Good default:
      #   0.2

        r_target: 0.03
      # Proposal step size for r_target [km/Myr].
      #
      # Usually smaller than rw_sigma_rstart because r_target often spans a
      # narrower useful range and can be sensitive.
      #
      # Recommended range:
      #   0.01 to 0.10
      #
      # Good default:
      #   0.02

      # ---- Complexity prior ---------------------------------------------------
      lambda_k: 1.0
      # Complexity penalty on the number of stages:
      #   p(K) ∝ exp(-lambda_k * (K - k_min))
      #
      # Effect:
      #   lambda_k = 0.0 -> no prior penalty on large K
      #   larger lambda_k -> stronger preference for simpler models
      #
      # Practical guidance:
      #   0.0 = pure flexibility / weak parsimony
      #   0.2-0.5 = moderate parsimony
      #   1.0+ = strong parsimony
      #
      # Recommended range:
      #   0.0 to 1.0
      #
      # Good default:
      #   0.5

      death_mode: merge_any
      # Merge strategy for death moves.
      #
      # merge_any:
      #   more flexible, better mixing, recommended
      #
      # merge_compatible:
      #   stricter/debug-like mode
      #
      # Recommended:
      #   merge_any

      # ---- BIC diagnostic -----------------------------------------------------
      bic_nobs: 4
      # Number of independent observations used in BIC calculation.
      #
      # Effect:
      #   higher values strengthen the BIC penalty term p*ln(N)
      #
      # Important:
      #   use the number of truly independent thermochronological observations
      #   entering the inversion.
      #
      # Recommended:
      #   set explicitly rather than relying on auto

  # ---- Optional: other erosion types (examples) ------------------------------
  # ero_type = 1 (constant magnitude over the run)
  # ero_type: 1
  # ero_option1: 2.0

  # ero_type = 3 (exponential decay)
  # ero_type: 3
  # ero_option1: 15.0
  # ero_option2: 20.0
  # ero_option3: 0.0

# ==============================================================================
# 7) Age prediction
# ==============================================================================
age_prediction:
  no_calc_ages: false

  ketch_aft: true
  madtrax_aft: false
  madtrax_aft_kinetic_model: 1
  madtrax_zft_kinetic_model: 1

  ap_rad: 45.0
  ap_uranium: 10.0
  ap_thorium: 40.0

  zr_rad: 60.0
  zr_uranium: 100.0
  zr_thorium: 40.0

  pad_time: 0.0
  past_age_increment: 0.0

# ==============================================================================
# 8) Observations and misfit
# ==============================================================================
observations:
  obs_age_file: "sample_data.csv"             # CSV file containing measured ages

  obs_ahe: []
  obs_ahe_stdev: []
  obs_aft: []
  obs_aft_stdev: []
  obs_zhe: []
  obs_zhe_stdev: []
  obs_zft: []
  obs_zft_stdev: []

  misfit_num_params: 0
  misfit_type: 1

# ==============================================================================
# 9) Plotting
# ==============================================================================
plotting:
  no_plot_results: false
  no_display_plots: false

  plot_myr: false
  plot_depth_history: false
  plot_fault_depth_history: false
  invert_tt_plot: false

  t_plots: [1, 3, 5, 7, 9, 10]

  crust_solidus: false
  crust_solidus_comp: "wet_intermediate"
  mantle_solidus: false
  mantle_solidus_xoh: 0.0
  solidus_ranges: false

# ==============================================================================
# 10) Output
# ==============================================================================
output:
  log_output: false
  log_file: ""
  model_id: ""

  write_temps: false
  write_past_ages: false
  write_age_output: false
  save_plots: true

# ==============================================================================
# 11) Advanced
# ==============================================================================
advanced:
  read_temps: false
  compare_temps: false

# ==============================================================================
# 12) Inversion hyperparameters
# ==============================================================================
inversion:
  neighbourhood_algorithm:
    na_ns: 20
    na_nr: 5
    na_ni: 50
    na_n: 5
    na_n_resample: 2000
    na_n_walkers: 5

  mcmc:
    mcmc_nwalkers: 24
    mcmc_nsteps: 300
    mcmc_discard: 0
    mcmc_thin: 3
